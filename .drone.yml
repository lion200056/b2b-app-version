kind: pipeline
type: docker
name: auto-deploy

trigger:
  branch:
  - main
  event:
  - push

steps:
- name: deploy
  image: alpine/git
  commands:
  - echo "Starting auto deployment..."
  - echo "This pipeline will trigger deployment via webhook or manual process"
  - echo "Repository updated successfully"
  - echo "Please manually run deployment on target server:"
  - echo "cd /home/jincoco/app/b2b-app-version"
  - echo "git pull origin main"
  - echo "docker compose down --remove-orphans"
  - echo "docker compose up -d --build"