kind: pipeline
type: docker
name: auto-deploy

trigger:
  branch:
  - main
  event:
  - push

steps:
- name: deploy
  image: docker:latest
  commands:
  - echo "Starting auto deployment..."
  - cd /opt/b2b-app-version
  - git fetch --all
  - git pull origin main
  - docker compose down --remove-orphans || true
  - docker compose up -d --build
  - sleep 10
  - docker compose ps
  - echo "Deployment completed!"
  volumes:
  - name: docker-sock
    path: /var/run/docker.sock
  environment:
    DOCKER_HOST: unix:///var/run/docker.sock

volumes:
- name: docker-sock
  host:
    path: /var/run/docker.sock