kind: pipeline
type: docker
name: auto-deploy

# 僅在 main 分支 push 時觸發
trigger:
  branch:
    - main
  event:
    - push

# 設置工作空間路徑 (可通過環境變數覆蓋)
environment:
  DEPLOY_PATH: ${DEPLOY_PATH=/opt/b2b-app-version}

# 簡化的部署步驟
steps:
  # 部署到目標機器
  - name: deploy
    image: docker:latest
    commands:
      - echo "🚀 開始自動化部署..."
      - echo "📍 部署路徑: $${DEPLOY_PATH}"
      
      # 切換到部署目錄
      - cd $${DEPLOY_PATH}
      
      # 拉取最新代碼
      - echo "📥 拉取最新代碼..."
      - git fetch --all
      - git pull origin main
      
      # 停止現有服務
      - echo "🛑 停止現有服務..."
      - docker compose down --remove-orphans || true
      
      # 重新構建並啟動
      - echo "🔨 重新構建並啟動服務..."
      - docker compose up -d --build
      
      # 等待服務啟動
      - echo "⏳ 等待服務啟動..."
      - sleep 10
      
      # 檢查服務狀態
      - echo "🔍 檢查服務狀態..."
      - docker compose ps
      
      # 完成通知
      - echo "✅ 部署完成！"
      - echo "🌐 前端: http://localhost:3080"
      - echo "🔗 後端: http://localhost:8321"
      
    volumes:
      # 掛載 Docker socket
      - name: docker-sock
        path: /var/run/docker.sock
    
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock

# 掛載卷
volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
